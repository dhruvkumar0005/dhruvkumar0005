<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" width="1600" height="500">
<style>
:root{--bg:#020617;--bg2:#0F172A;--bg3:#111827;--card:#1E293B;--b:#3B82F6;--c:#06B6D4;--d:#38BDF8;--p:#A855F7;--w:#fff;}
text{font-family:Inter,Segoe UI,Arial,sans-serif}
#mesh{animation:mesh 16s ease-in-out infinite alternate}
@keyframes mesh{0%{transform:translate(-40px,-20px)}100%{transform:translate(40px,20px)}}
.float{animation:f 8s ease-in-out infinite}
@keyframes f{50%{transform:translateY(-10px)}}
.node{animation:pulse 2.4s infinite}
@keyframes pulse{50%{opacity:.35;r:5}}
.wave{animation:wave 9s linear infinite}
@keyframes wave{from{transform:translateX(0)}to{transform:translateX(-200px)}}
.grad{background-size:200% 200%;animation:g 8s linear infinite}
@keyframes g{50%{filter:hue-rotate(20deg)}}
.cursor{animation:blink 1s steps(2,end) infinite}
@keyframes blink{50%{opacity:0}}
.fade{opacity:0;animation:cycle 24s infinite}
.fade:nth-of-type(1){animation-delay:0s}
.fade:nth-of-type(2){animation-delay:3s}
.fade:nth-of-type(3){animation-delay:6s}
.fade:nth-of-type(4){animation-delay:9s}
.fade:nth-of-type(5){animation-delay:12s}
.fade:nth-of-type(6){animation-delay:15s}
.fade:nth-of-type(7){animation-delay:18s}
.fade:nth-of-type(8){animation-delay:21s}
@keyframes cycle{0%,10%{opacity:1}12%,100%{opacity:0}}
.glow{filter:url(#glow)}
.small{fill:#9fb3d1;font-size:22px}
</style>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#020617"/>
<stop offset=".5" stop-color="#0F172A"/>
<stop offset="1" stop-color="#111827"/>
</linearGradient>
<radialGradient id="r1"><stop offset="0" stop-color="#3B82F6" stop-opacity=".5"/><stop offset="1" stop-color="#3B82F6" stop-opacity="0"/></radialGradient>
<radialGradient id="r2"><stop offset="0" stop-color="#A855F7" stop-opacity=".4"/><stop offset="1" stop-color="#A855F7" stop-opacity="0"/></radialGradient>
<linearGradient id="nameGrad" x1="0" x2="1">
<stop offset="0" stop-color="#3B82F6"/><stop offset=".5" stop-color="#06B6D4"/><stop offset="1" stop-color="#A855F7"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="1600" height="500" fill="url(#bg)"/>
<g id="mesh">
<circle cx="220" cy="120" r="180" fill="url(#r1)"/>
<circle cx="1370" cy="110" r="170" fill="url(#r2)"/>
<circle cx="800" cy="420" r="220" fill="url(#r1)" opacity=".35"/>
</g>

