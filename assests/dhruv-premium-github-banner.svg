="#3B82F6" stroke-width="0.5"/><line x1="0" y1="440" x2="1600" y2="440" stroke="#3B82F6" stroke-width="0.5"/><line x1="0" y1="480" x2="1600" y2="480" stroke="#3B82F6" stroke-width="0.5"/></g>
